<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập</title>
    <link rel="stylesheet" href="./assets/Giao_dien/index.css" />

  <body>
    <h1>Đăng nhập</h1>
    <img class="logo" class="logo" src="./assets/img/logo.png" alt="logo" />

    <form id="loginForm">
      <label for="username">Tài khoản:</label><br />

      <input type="password" id="password" name="password" required />
      <br /><br />
      <button type="submit">Tiếp tục</button>
    </form>

    <script src="./assets/Chuc_nang/login.js"></script>
  </body>
</html>
