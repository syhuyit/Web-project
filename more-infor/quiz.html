    <main>
      <form class="quiz-form">
        <h1>Quiz</h1>
        <h3>Chọn đáp án đúng</h3>
        <hr />
        <div class="quiz">
          <div class="question">
            <p>HTML là viết tắt của từ gì?</p>
            <label class="answer">
              <input type="radio" name="q1" data-correct="true" />
              Hyper Text Markup Language
            </label>
            <label class="answer">
              <input type="radio" name="q1" />
              Home Tool Markup Language
            </label>
            <label class="answer">
              <input type="radio" name="q1" />
              Hyper Tool Markup Language
            </label>
            <label class="answer">
              <input type="radio" name="q1" />
              Hyperlinks and Text Markup Language
            </label>
          </div>

          <div class="question">
            <p>CSS dùng để làm gì?</p>
            <label class="answer">
              <input type="radio" name="q2" data-correct="true" />
              Tạo giao diện cho website
            </label>
            <label class="answer">
              <input type="radio" name="q2" />
              Lập trình server
            </label>
            <label class="answer">
              <input type="radio" name="q2" />
              Quản lý cơ sở dữ liệu
            </label>
          </div>

          <div class="question">
            <p>CSS là viết tắt của từ gì?</p>
            <label class="answer">
              <input type="radio" name="q3" />
              Creative Style Sheets
            </label>
            <label class="answer">
              <input type="radio" name="q3" />
              Colorful Style Sheets
            </label>
            <label class="answer">
              <input type="radio" name="q3" data-correct="true" />
              Cascading Style Sheets
            </label>
            <label class="answer">
              <input type="radio" name="q3" />
              Computer Style Sheets
            </label>
          </div>
        </div>

        <button class="reset" type="reset">Làm lại</button>
      </form>
