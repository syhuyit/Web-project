    <link rel="stylesheet" href="../assets/Giao_dien/menu.css" />

  </head>
  <body>
    <nav class="navbar">
      <div class="nav-left">
        <img src="../assets/img/logo.png" class="logo" />
        <span class="brand">CodeNest</span>
      </div>

      <ul class="nav-menu">
        <li><a href="./home.html">Home</a></li>

    <main>
      <h2>Thực hành</h2>
      <div class="editor">
        <textarea
          name="htmlCode"
          id="htmlCode"
          placeholder="Nhập HTML ở đây..."
        ></textarea>
        <textarea
          name="cssCode"
          id="cssCode"
          placeholder="Nhập CSS ở đây..."
        ></textarea>
        <textarea
          name="jsCode"
          id="jsCode"
          placeholder="Nhập JS ở đây..."
        ></textarea>
      </div>
      <br />
      <button class="run" onclick="runCode()">RUN</button>
      <h3 class="result">Kết quả</h3>
      <iframe id="result"></iframe>
    </main>
    <script src="../assets/Chuc_nang/practice.js"></script>
